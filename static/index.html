<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>AutoMedia — 分镜工作台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 40px 24px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 32px;
      color: #fff;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      max-width: 600px;
      margin-bottom: -1px;
    }
    .tab-btn {
      background: none;
      border: 1px solid #2a2a2a;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      color: #666;
      padding: 8px 20px;
      font-size: 13px;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
    }
    .tab-btn.active {
      background: #1a1a1a;
      color: #fff;
      border-color: #333;
    }
    .tab-btn:hover:not(.active) { color: #aaa; }

    .input-panel {
      max-width: 600px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 0 8px 8px 8px;
      padding: 20px;
    }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed #333;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #6c63ff;
      background: #1a1a2e;
    }
    .upload-zone p { color: #888; font-size: 14px; margin-top: 8px; }
    .upload-zone input { display: none; }

    /* Script text area */
    #script-text {
      width: 100%;
      height: 180px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #ccc;
      font-size: 13px;
      padding: 12px;
      resize: vertical;
      line-height: 1.6;
    }
    #script-text::placeholder { color: #444; }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      max-width: 600px;
    }
    select {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #ccc;
      padding: 8px 12px;
      font-size: 13px;
    }
    button {
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #574fd6; }
    button:disabled { background: #333; cursor: not-allowed; }

    /* Progress */
    #progress-bar-wrap {
      display: none;
      max-width: 600px;
      margin-top: 20px;
    }
    #progress-label { font-size: 13px; color: #888; margin-bottom: 8px; }
    #progress-bar {
      height: 4px;
      background: #222;
      border-radius: 4px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      background: #6c63ff;
      width: 0%;
      transition: width 0.4s;
      border-radius: 4px;
    }

    /* Error */
    #error-msg {
      display: none;
      color: #ff6b6b;
      font-size: 13px;
      margin-top: 16px;
      max-width: 600px;
    }

    /* Storyboard grid */
    #storyboard {
      display: none;
      margin-top: 40px;
    }
    #storyboard h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #fff;
    }
    .shots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .shot-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px;
      transition: border-color 0.2s;
    }
    .shot-card:hover { border-color: #6c63ff44; }
    .shot-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .shot-id {
      font-size: 11px;
      font-weight: 700;
      color: #6c63ff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .shot-meta {
      display: flex;
      gap: 6px;
    }
    .tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      background: #2a2a2a;
      color: #888;
    }
    .tag.type { background: #1e1e3a; color: #9d97ff; }
    .shot-field { margin-bottom: 10px; }
    .shot-field label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 4px;
    }
    .shot-field p {
      font-size: 13px;
      color: #ccc;
      line-height: 1.5;
    }
    .shot-field .en { font-size: 12px; color: #888; font-style: italic; }

    /* TTS controls */
    .tts-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #222;
    }
    .tts-btn {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 6px;
      background: #1e1e3a;
      color: #9d97ff;
      border: 1px solid #2a2a3a;
      cursor: pointer;
    }
    .tts-btn:hover { background: #2a2a4a; }
    .tts-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .tts-duration { font-size: 11px; color: #555; }

    /* TTS section header */
    .tts-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 32px;
      margin-bottom: 16px;
    }
    .tts-section h2 { font-size: 16px; font-weight: 600; color: #fff; }
    .voice-select { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: #ccc; padding: 6px 10px; font-size: 13px; }
    .tts-all-btn { font-size: 13px; padding: 8px 20px; }
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 4px;
    }
    .shot-field p {
      font-size: 13px;
      color: #ccc;
      line-height: 1.5;
    }
    .shot-field .en { font-size: 12px; color: #888; font-style: italic; }
  </style>
</head>
<body>

<h1>AutoMedia 分镜工作台</h1>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('upload')">上传文件</button>
  <button class="tab-btn" onclick="switchTab('paste')">粘贴文字</button>
</div>

<div class="input-panel">
  <!-- Upload tab -->
  <div id="tab-upload">
    <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <svg width="32" height="32" fill="none" stroke="#555" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 12V4m0 0L8 8m4-4l4 4"/>
      </svg>
      <p>点击或拖拽上传剧本文件</p>
      <p>支持 .txt / .json</p>
      <input type="file" id="file-input" accept=".txt,.json">
    </div>
    <textarea id="script-text-upload" style="width:100%;height:120px;background:#111;border:1px solid #2a2a2a;border-radius:8px;color:#ccc;font-size:13px;padding:12px;resize:vertical;line-height:1.6;margin-top:12px;display:none"></textarea>
  </div>

  <!-- Paste tab -->
  <div id="tab-paste" style="display:none">
    <textarea id="script-text-paste" placeholder="直接粘贴剧本文字到这里..." style="width:100%;height:200px;background:#111;border:1px solid #2a2a2a;border-radius:8px;color:#ccc;font-size:13px;padding:12px;resize:vertical;line-height:1.6"></textarea>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <select id="provider-select" onchange="updateModels()">
    <option value="">选择 Provider</option>
    <option value="claude">Claude</option>
    <option value="openai">OpenAI</option>
    <option value="qwen">Qwen</option>
    <option value="zhipu">智谱 GLM</option>
    <option value="gemini">Gemini</option>
  </select>
  <select id="model-select">
    <option value="">选择模型</option>
  </select>
  <button id="parse-btn" onclick="parseStoryboard()">开始解析分镜</button>
</div>

<!-- Progress -->
<div id="progress-bar-wrap">
  <div id="progress-label">正在解析...</div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<!-- Error -->
<div id="error-msg"></div>

<!-- Storyboard result -->
<div id="storyboard">
  <div class="tts-section">
    <h2 id="storyboard-title"></h2>
    <div style="display:flex;gap:8px;align-items:center">
      <select id="voice-select" class="voice-select"></select>
      <button class="button tts-all-btn" onclick="generateAllTTS()">全部生成语音</button>
      <button class="button tts-all-btn" onclick="generateAllImages()">全部生成图片</button>
      <button class="button tts-all-btn" onclick="generateAllVideos()">全部生成视频</button>
    </div>
  </div>
  <div class="shots-grid" id="shots-grid"></div>
</div>

<script>
  const API_BASE = 'http://localhost:8000';
  let projectId = 'ui-' + Date.now();
  let activeTab = 'upload';

  const MODELS = {
    claude:  ['claude-sonnet-4-6', 'claude-opus-4-6', 'claude-haiku-4-5-20251001'],
    openai:  ['gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo'],
    qwen:    ['qwen-plus', 'qwen-max', 'qwen-turbo'],
    zhipu:   ['glm-4', 'glm-4-flash', 'glm-3-turbo'],
    gemini:  ['gemini-2.0-flash', 'gemini-2.0-pro', 'gemini-1.5-flash'],
  };

  function updateModels() {
    const provider = document.getElementById('provider-select').value;
    const modelSel = document.getElementById('model-select');
    modelSel.innerHTML = '<option value="">选择模型</option>';
    if (provider && MODELS[provider]) {
      MODELS[provider].forEach((m, i) => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m + (i === 0 ? ' (默认)' : '');
        modelSel.appendChild(opt);
      });
      modelSel.value = MODELS[provider][0];
    }
  }

  function switchTab(tab) {
    activeTab = tab;
    document.getElementById('tab-upload').style.display = tab === 'upload' ? 'block' : 'none';
    document.getElementById('tab-paste').style.display = tab === 'paste' ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', (i === 0 && tab === 'upload') || (i === 1 && tab === 'paste'));
    });
  }

  function getScript() {
    if (activeTab === 'paste') {
      return document.getElementById('script-text-paste').value.trim();
    }
    return document.getElementById('script-text-upload').value.trim();
  }

  const dropZone = document.getElementById('drop-zone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });
  document.getElementById('file-input').addEventListener('change', e => handleFile(e.target.files[0]));

  function handleFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      let text = e.target.result;
      if (file.name.endsWith('.json')) {
        try {
          const obj = JSON.parse(text);
          text = obj.script || obj.content || obj.text || JSON.stringify(obj, null, 2);
        } catch (_) {}
      }
      const ta = document.getElementById('script-text-upload');
      ta.value = text.trim();
      ta.style.display = 'block';
      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('storyboard').style.display = 'none';
    };
    reader.readAsText(file);
  }

  async function parseStoryboard() {
    const script = getScript();
    const provider = document.getElementById('provider-select').value;
    const model = document.getElementById('model-select').value;
    const errEl = document.getElementById('error-msg');

    if (!script) {
      errEl.textContent = '请先上传文件或粘贴剧本内容';
      errEl.style.display = 'block';
      return;
    }
    if (!provider) {
      errEl.textContent = '请选择 Provider';
      errEl.style.display = 'block';
      return;
    }

    const btn = document.getElementById('parse-btn');
    btn.disabled = true;
    errEl.style.display = 'none';
    document.getElementById('storyboard').style.display = 'none';
    showProgress('正在调用 LLM 解析分镜...', 20);

    try {
      const params = new URLSearchParams({ script, provider });
      if (model) params.append('model', model);

      showProgress('LLM 处理中，请稍候...', 60);

      const res = await fetch(`${API_BASE}/api/v1/pipeline/${projectId}/storyboard?${params}`, {
        method: 'POST',
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || '请求失败');
      }

      showProgress('解析完成，渲染卡片...', 90);
      const data = await res.json();
      renderStoryboard(data);
      showProgress('完成', 100);
      setTimeout(() => document.getElementById('progress-bar-wrap').style.display = 'none', 800);

    } catch (err) {
      document.getElementById('progress-bar-wrap').style.display = 'none';
      errEl.textContent = '错误：' + err.message;
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
    }
  }

  function showProgress(label, pct) {
    document.getElementById('progress-bar-wrap').style.display = 'block';
    document.getElementById('progress-label').textContent = label;
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  let currentShots = [];

  // Load voices on page load
  async function loadVoices() {
    const res = await fetch(`${API_BASE}/api/v1/tts/voices`);
    const voices = await res.json();
    const sel = document.getElementById('voice-select');
    voices.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = v.name;
      sel.appendChild(opt);
    });
  }
  loadVoices();

  function renderStoryboard(data) {
    currentShots = data.shots;
    const grid = document.getElementById('shots-grid');
    grid.innerHTML = '';

    document.getElementById('storyboard-title').textContent =
      `${data.shots.length} 个分镜  ·  共 ${data.shots.reduce((s, x) => s + x.estimated_duration, 0)} 秒`;

    data.shots.forEach(shot => {
      const card = document.createElement('div');
      card.className = 'shot-card';
      card.id = `card-${shot.shot_id}`;
      card.innerHTML = `
        <div class="shot-header">
          <span class="shot-id">${shot.shot_id}</span>
          <div class="shot-meta">
            <span class="tag type">${shot.camera_motion}</span>
            <span class="tag">${shot.estimated_duration}s</span>
          </div>
        </div>
        ${shot.dialogue ? `<div class="shot-field"><label>台词 / 旁白</label><p>${shot.dialogue}</p></div>` : ''}
        <div class="shot-field"><label>画面描述</label><p>${shot.visual_description_zh}</p></div>
        <div class="shot-field"><label>Visual Prompt</label><p class="en">${shot.visual_prompt}</p></div>
        ${shot.dialogue ? `
        <div class="tts-bar" id="tts-bar-${shot.shot_id}">
          <button class="tts-btn" onclick="generateOneTTS('${shot.shot_id}')">生成语音</button>
          <span class="tts-duration" id="tts-dur-${shot.shot_id}"></span>
        </div>` : ''}
        <div class="tts-bar" id="img-bar-${shot.shot_id}">
          <button class="tts-btn" onclick="generateOneImage('${shot.shot_id}')">生成图片</button>
        </div>
      `;
      grid.appendChild(card);
    });

    document.getElementById('storyboard').style.display = 'block';
  }

  async function generateOneTTS(shotId) {
    const shot = currentShots.find(s => s.shot_id === shotId);
    if (!shot || !shot.dialogue) return;
    const voice = document.getElementById('voice-select').value;
    const btn = document.querySelector(`#tts-bar-${shotId} .tts-btn`);
    btn.disabled = true;
    btn.textContent = '生成中...';
    try {
      const res = await fetch(`${API_BASE}/api/v1/tts/${projectId}/generate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ shots: [shot], voice }),
      });
      if (!res.ok) throw new Error('TTS 失败');
      const results = await res.json();
      const r = results[0];
      const bar = document.getElementById(`tts-bar-${shotId}`);
      bar.innerHTML = `
        <audio controls src="${API_BASE}${r.audio_url}" style="height:28px;flex:1"></audio>
        <span class="tts-duration">${r.duration_seconds.toFixed(1)}s</span>
        <button class="tts-btn" onclick="generateOneTTS('${shotId}')">重新生成</button>
      `;
    } catch (e) {
      btn.disabled = false;
      btn.textContent = '生成失败，重试';
    }
  }

  async function generateAllTTS() {
    const shotsWithDialogue = currentShots.filter(s => s.dialogue);
    if (!shotsWithDialogue.length) return;
    const voice = document.getElementById('voice-select').value;
    await Promise.all(shotsWithDialogue.map(s => generateOneTTS(s.shot_id)));
  }

  async function generateOneImage(shotId) {
    const shot = currentShots.find(s => s.shot_id === shotId);
    if (!shot) return;
    const btn = document.querySelector(`#img-bar-${shotId} .tts-btn`);
    btn.disabled = true;
    btn.textContent = '生成中...';
    try {
      const res = await fetch(`${API_BASE}/api/v1/image/${projectId}/generate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ shots: [shot] }),
      });
      if (!res.ok) throw new Error('图片生成失败');
      const results = await res.json();
      const r = results[0];
      document.getElementById(`img-bar-${shotId}`).innerHTML = `
        <img src="${API_BASE}${r.image_url}" style="width:100%;border-radius:6px;margin-top:4px">
        <div style="display:flex;gap:6px;margin-top:6px">
          <button class="tts-btn" onclick="generateOneImage('${shotId}')">重新生成</button>
          <button class="tts-btn" onclick="generateOneVideo('${shotId}')">生成视频</button>
        </div>
      `;
    } catch (e) {
      btn.disabled = false;
      btn.textContent = '生成失败，重试';
    }
  }

  async function generateAllImages() {
    await Promise.all(currentShots.map(s => generateOneImage(s.shot_id)));
  }

  async function generateOneVideo(shotId) {
    const shot = currentShots.find(s => s.shot_id === shotId);
    if (!shot || !shot.image_url) return;
    const bar = document.getElementById(`img-bar-${shotId}`);
    const btn = bar.querySelector('button[onclick*="generateOneVideo"]');
    if (btn) { btn.disabled = true; btn.textContent = '生成中...'; }
    try {
      const res = await fetch(`${API_BASE}/api/v1/video/${projectId}/generate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ shots: [shot] }),
      });
      if (!res.ok) throw new Error('视频生成失败');
      const results = await res.json();
      const r = results[0];
      shot.video_url = r.video_url;
      const videoEl = document.createElement('div');
      videoEl.style.marginTop = '6px';
      videoEl.innerHTML = `<video controls src="${API_BASE}${r.video_url}" style="width:100%;border-radius:6px"></video>`;
      bar.appendChild(videoEl);
      if (btn) { btn.disabled = false; btn.textContent = '重新生成视频'; }
    } catch (e) {
      if (btn) { btn.disabled = false; btn.textContent = '生成失败，重试'; }
    }
  }

  async function generateAllVideos() {
    await Promise.all(currentShots.filter(s => s.image_url).map(s => generateOneVideo(s.shot_id)));
  }
</script>
</body>
</html>
